services:
  weaviate_rbac:
    command:
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    - --scheme
    - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.38.0-rc.1
    ports:
    - 8580:8080
    - 50551:50051
    restart: on-failure:0
    depends_on:
      - keycloak
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      ASYNC_INDEXING: 'true'
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama,backup-filesystem'
      BACKUP_FILESYSTEM_PATH: '/var/lib/weaviate/backups'
      CLUSTER_HOSTNAME: 'node1'
      AUTHENTICATION_APIKEY_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: 'root-user-key'
      AUTHENTICATION_APIKEY_USERS: 'root-user'
      AUTHORIZATION_RBAC_ENABLED: 'true'
      AUTHORIZATION_RBAC_ROOT_USERS: 'root-user'
      AUTHENTICATION_DB_USERS_ENABLED: 'true'
      AUTHENTICATION_OIDC_ENABLED: 'true'
      # Matches the `iss` claim Keycloak issues (docker-internal hostname).
      # Weaviate validates the token signature by fetching the JWKS from the
      # issuer URL — using the service name keeps the lookup inside Docker.
      AUTHENTICATION_OIDC_ISSUER: 'http://keycloak:8081/realms/weaviate-test'
      AUTHENTICATION_OIDC_USERNAME_CLAIM: 'preferred_username'
      AUTHENTICATION_OIDC_GROUPS_CLAIM: 'groups'
      AUTHENTICATION_OIDC_CLIENT_ID: 'weaviate'

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    ports:
      - "8081:8081"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_PORT: '8081'
      # Force Keycloak to always issue tokens with iss=http://keycloak:8081/...
      # so the `iss` claim matches what Weaviate validates against (and the
      # JWKS lookup stays inside the docker network). The host:port mapping
      # in `ports:` still lets us POST to /token from outside.
      KC_HOSTNAME: 'keycloak'
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HOSTNAME_STRICT_BACKCHANNEL: 'false'
    command:
      - start-dev
      - --http-relative-path=/
    volumes:
      - keycloak_data:/opt/keycloak/data

volumes:
  keycloak_data:
