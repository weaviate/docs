---
# Namespace-enabled instance for the `_includes/code/howto/namespaces.py` snippet.
# Namespaces require three boot invariants: NAMESPACES_ENABLED=true,
# DISABLE_GRAPHQL=true, and REPLICATION_MAXIMUM_FACTOR=1. The operator
# principal is a static API key (always classified as "global"), which the
# test exposes to the snippet via OPERATOR_API_KEY.
services:
  weaviate_namespaces:
    command:
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    - --scheme
    - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.38.0-rc.0
    ports:
    - 8680:8080
    - 50651:50051
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      CLUSTER_HOSTNAME: 'node1'
      # Namespace prerequisites — validated together at boot.
      NAMESPACES_ENABLED: 'true'
      DISABLE_GRAPHQL: 'true'
      REPLICATION_MAXIMUM_FACTOR: 1
      # Operator (global) principal: a static API key.
      AUTHENTICATION_APIKEY_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: 'operator-api-key'
      AUTHENTICATION_APIKEY_USERS: 'operator-user'
      AUTHORIZATION_RBAC_ENABLED: 'true'
      AUTHORIZATION_RBAC_ROOT_USERS: 'operator-user'
      # Required so the operator can create namespaced DB users.
      AUTHENTICATION_DB_USERS_ENABLED: 'true'
...
