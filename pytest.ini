[pytest]
python_files = test_*.py *_test.py
norecursedirs = _* .github .idea* .pytest_cache .venv venv* blog developers downloads playbook src static
markers =
  pyv4: groups tests by language for v4 client only (python)
  agents: group tests for Weaviate Agents
  engram: group tests for Weaviate Engram
  engram_curl: group tests for Weaviate Engram using cURL
  engram_python: group tests for Weaviate Engram using Python client
  ts: groups tests by language (typescript)
  java: groups tests by language (java client)
  csharp: groups tests by language (c#)
  wcd: tests that use remote WCD clusters
  indexability: HTML structure tests for docs indexability (no API keys)
  indexability_agents: AI agent tests for docs indexability (requires API keys)
